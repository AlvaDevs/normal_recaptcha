<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Verificación de Seguridad</title>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        />
        <link
            href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div id="contenedor-verificacion">
            <div class="captcha-box" onclick="iniciarProceso()">
                <div class="checkbox-area">
                    <div id="indicador-carga" class="checkbox-vacio"></div>
                </div>
                <div class="texto-captcha">No soy un robot</div>
                <div class="logo-captcha">
                    <img
                        src="https://www.gstatic.com/recaptcha/api2/logo_48.png"
                        alt="reCAPTCHA"
                    />
                    <div class="subtexto">reCAPTCHA</div>
                    <div class="enlaces-legales">Privacidad - Condiciones</div>
                </div>
            </div>
        </div>

        <div id="protocolo-seguridad" style="display: none">
            <div class="panel-validacion">
                <h2>Verificación de Humanidad Profunda</h2>
                <p>
                    Se ha detectado un patrón de clic sospechoso. Para confirmar
                    tu identidad orgánica, justifica tu existencia. (Mínimo 200
                    palabras)
                </p>

                <textarea
                    id="entrada-validacion"
                    placeholder="Escribe tu justificación existencial aquí..."
                ></textarea>

                <div class="metricas">
                    <span id="conteo-caracteres">0</span> caracteres |
                    <span id="conteo-palabras">0</span> / 200 palabras
                </div>

                <button onclick="validarRespuesta()" id="boton-verificar">
                    VERIFICAR
                </button>
                <div id="mensaje-estado" class="caja-estado"></div>
            </div>
        </div>

        <script src="script.js"></script>
    </body>
</html>
